<!DOCTYPE html>
<html>
<head>
    <title>Junior Developer Dashboard</title>
    <style>body { font-family: sans-serif; background: #eceff1; color: #333; padding: 50px; } .container { max-width: 800px; margin: auto; } button { padding: 10px; background: #546e7a; color: white; border: none; cursor: pointer; float: right; }</style>
</head>
<body>
    <div class="container">
        <button onclick="logout()">Logout</button>
        <h1 style="color: #546e7a;">Developer Console</h1>
        <h3>Welcome, Developer <span id="uname"></span></h3>
        <hr>
        <ul>
            <li>View Assigned Bug Fixes</li>
            <li>Commit Secure Code (SAST Checked)</li>
            <li>Read API Security Documentation</li>
        </ul>
    </div>
    <script>
        document.getElementById('uname').innerText = sessionStorage.getItem("loggedInUser");
        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
