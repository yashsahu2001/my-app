<!DOCTYPE html>
<html>
<head>
    <title>CTO / Pentester Dashboard</title>
    <style>body { font-family: sans-serif; background: #37474f; color: white; padding: 50px; } .container { max-width: 800px; margin: auto; } button { padding: 10px; background: #00b0ff; color: white; border: none; cursor: pointer; float: right; }</style>
</head>
<body>
    <div class="container">
        <button onclick="logout()">Logout</button>
        <h1 style="color: #00b0ff;">Penetration Testing Hub</h1>
        <h3>Welcome, CTO <span id="uname"></span></h3>
        <hr>
        <ul>
            <li>Review Active Vulnerability Scans</li>
            <li>Deploy Security Patches to Production</li>
            <li>Analyze Network Intrusion Logs</li>
        </ul>
    </div>
    <script>
        document.getElementById('uname').innerText = sessionStorage.getItem("loggedInUser");
        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
