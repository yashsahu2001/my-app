<!DOCTYPE html>
<html>
<head><title>Authenticating...</title></head>
<body>
    <h3 style="text-align: center; margin-top: 50px; font-family: sans-serif;">Verifying WSO2 Token & Routing...</h3>
    <script>
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) { return null; }
        }

        window.onload = function() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const idToken = params.get("id_token");

            if (idToken) {
                const decoded = parseJwt(idToken);
                const username = decoded.sub.split('@')[0]; // Extract exact username

                // Save username to session so dashboards can say "Welcome"
                sessionStorage.setItem("loggedInUser", username);

                // Route to the correct HTML file
                if (username === "yashsahu") {
                    window.location.href = "ciso.html";
                } else if (username === "kundan.pal") {
                    window.location.href = "cto.html";
                } else if (username === "subojeetg") {
                    window.location.href = "dev.html";
                } else {
                    alert("Unauthorized User Role.");
                    window.location.href = "index.html";
                }
            } else {
                window.location.href = "index.html"; // No token, send back to login
            }
        }
    </script>
</body>
</html>
